<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>作业计时器</title>
    <script>
      // Unregister stale SW so the next page load gets fresh content
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (a) {
          for (var i = 0; i < a.length; i++) a[i].unregister()
        })
      }
      // Convert real path to hash before React loads — prevents old
      // BrowserRouter (cached by SW) from redirecting to root.
      if (location.pathname.startsWith('/homework_timer/') && !location.hash) {
        var route = location.pathname.slice('/homework_timer/'.length - 1) || '/'
        history.replaceState(null, '', '/homework_timer/#' + route)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
