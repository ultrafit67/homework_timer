name: Deploy to GitHub Pages & Cloudflare Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: SPA fallback — 404 redirect to HashRouter root
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Redirecting...</title><script>
          location.replace('/homework_timer/#' + location.pathname.replace('/homework_timer/', '/') + location.search)
          </script></head>
          <body></body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Upload dist for Cloudflare Pages
        uses: actions/upload-artifact@v4
        with:
          name: cf-pages-dist
          path: dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check Cloudflare API token
        id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.defined == 'true'
        with:
          name: cf-pages-dist
          path: dist
      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.defined == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=homework-timer
